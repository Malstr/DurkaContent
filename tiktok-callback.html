<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TikTok Callback - DurkaContent</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">DurkaContent</a>
    <nav>
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
    </nav>
  </header>

  <main>
    <section class="legal">
      <p class="eyebrow">TikTok authorization</p>
      <h1>Authorization callback</h1>
      <p>
        Copy the full callback URL below and send it to your Telegram bot. The bot will exchange
        the code for TikTok access tokens.
      </p>

      <label for="callback-url"><strong>Callback URL</strong></label>
      <textarea id="callback-url" readonly rows="5" style="width:100%;margin-top:8px;"></textarea>

      <div class="actions">
        <button class="button primary" id="copy-url" type="button">Copy callback URL</button>
      </div>

      <h2>Code</h2>
      <p id="code-value">No code found in the URL.</p>

      <h2>State</h2>
      <p id="state-value">No state found in the URL.</p>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code") || "";
    const state = params.get("state") || "";
    const callbackUrl = window.location.href;

    document.getElementById("callback-url").value = callbackUrl;
    document.getElementById("code-value").textContent = code || "No code found in the URL.";
    document.getElementById("state-value").textContent = state || "No state found in the URL.";

    document.getElementById("copy-url").addEventListener("click", async () => {
      await navigator.clipboard.writeText(callbackUrl);
      document.getElementById("copy-url").textContent = "Copied";
    });
  </script>
</body>
</html>
